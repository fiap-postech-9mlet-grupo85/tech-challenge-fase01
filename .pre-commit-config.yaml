repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Recomenda-se usar a versão mais recente ou alinhar com o seu pyproject.toml
    rev: v0.3.5
    hooks:
      # Roda o linter e aplica as correções automáticas (como ordem de imports)
      - id: ruff
        args: [ --fix ]
      # Roda o formatador (substitui o black)
      - id: ruff-format
